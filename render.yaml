services:
  - type: web
    name: belajar-ppg
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: DEV_TOKEN
        value: tahubulat
      - key: IP_SALT
        generateValue: true
